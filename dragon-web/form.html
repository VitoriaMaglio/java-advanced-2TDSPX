<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Cadastrar Dragao</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
	<script src="script.js"></script>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative min-h-screen overflow-x-hidden bg-dragon-coal px-4 py-10 text-zinc-100 sm:px-6">
	<div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_15%_10%,rgba(197,161,91,0.2),transparent_35%),radial-gradient(circle_at_80%_0%,rgba(122,16,16,0.35),transparent_30%),linear-gradient(to_bottom,#0b0a0d,#09080c)]"></div>

	<main class="relative mx-auto max-w-3xl">
		<section class="rounded-2xl border border-dragon-gold/20 bg-dragon-ash/70 p-6 shadow-[0_0_50px_rgba(0,0,0,0.55)] backdrop-blur-sm sm:p-8">
			<p class="font-scroll text-sm uppercase tracking-[0.35em] text-dragon-gold/80">Novo Registro</p>
			<h1 class="mt-2 font-crown text-3xl font-bold uppercase tracking-[0.15em] text-dragon-gold sm:text-4xl">Cadastrar Dragão</h1>
			<p id="form-status" class="mt-3 min-h-6 font-scroll text-lg text-zinc-300"></p>

			<form id="dragon-form" class="mt-6 grid grid-cols-1 gap-4 sm:grid-cols-2">
				<div class="sm:col-span-2">
					<label for="nome" class="mb-1 block font-scroll text-lg text-zinc-200">Nome</label>
					<input id="nome" name="nome" type="text" required class="w-full rounded-lg border border-zinc-600 bg-zinc-900/80 px-3 py-2 font-scroll text-zinc-100 outline-none transition focus:border-dragon-gold focus:ring-2 focus:ring-dragon-gold/25" />
				</div>

				<div>
					<label for="cor" class="mb-1 block font-scroll text-lg text-zinc-200">Cor</label>
					<input id="cor" name="cor" type="text" required class="w-full rounded-lg border border-zinc-600 bg-zinc-900/80 px-3 py-2 font-scroll text-zinc-100 outline-none transition focus:border-dragon-gold focus:ring-2 focus:ring-dragon-gold/25" />
				</div>

				<div>
					<label for="poderDeFogo" class="mb-1 block font-scroll text-lg text-zinc-200">Poder de Fogo</label>
					<input id="poderDeFogo" name="poderDeFogo" type="number" min="0" required class="w-full rounded-lg border border-zinc-600 bg-zinc-900/80 px-3 py-2 font-scroll text-zinc-100 outline-none transition focus:border-dragon-gold focus:ring-2 focus:ring-dragon-gold/25" />
				</div>

				<div>
					<label for="peso" class="mb-1 block font-scroll text-lg text-zinc-200">Peso (kg)</label>
					<input id="peso" name="peso" type="number" min="0" step="0.1" required class="w-full rounded-lg border border-zinc-600 bg-zinc-900/80 px-3 py-2 font-scroll text-zinc-100 outline-none transition focus:border-dragon-gold focus:ring-2 focus:ring-dragon-gold/25" />
				</div>

				<div>
					<label for="altura" class="mb-1 block font-scroll text-lg text-zinc-200">Altura (m)</label>
					<input id="altura" name="altura" type="number" min="0" step="0.1" required class="w-full rounded-lg border border-zinc-600 bg-zinc-900/80 px-3 py-2 font-scroll text-zinc-100 outline-none transition focus:border-dragon-gold focus:ring-2 focus:ring-dragon-gold/25" />
				</div>

				<div class="sm:col-span-2">
					<label class="inline-flex items-center gap-2 font-scroll text-lg text-zinc-200">
						<input id="possuiMontador" name="possuiMontador" type="checkbox" class="h-4 w-4 rounded border-zinc-500 bg-zinc-900 text-dragon-gold focus:ring-dragon-gold/40" />
						Possui montador
					</label>
				</div>

				<div class="sm:col-span-2 mt-2 flex flex-col gap-3 sm:flex-row sm:justify-end">
					<a href="index.html" class="inline-flex items-center justify-center rounded-lg border border-zinc-500 px-4 py-2 font-crown text-sm uppercase tracking-[0.14em] text-zinc-200 transition hover:bg-zinc-800">Cancelar</a>
					<button type="submit" class="inline-flex items-center justify-center rounded-lg border border-dragon-gold/50 bg-dragon-ember/50 px-4 py-2 font-crown text-sm uppercase tracking-[0.14em] text-dragon-gold transition hover:bg-dragon-ember/70">Salvar Dragao</button>
				</div>
			</form>
		</section>
	</main>

</body>
</html>
