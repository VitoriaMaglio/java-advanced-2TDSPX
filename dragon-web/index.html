<!DOCTYPE html>
<html lang="pt-BR">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Lista de Dragões</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Crimson+Text:wght@400;600&display=swap" rel="stylesheet">
	<script src="script.js"></script>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="relative min-h-screen overflow-x-hidden bg-dragon-coal px-4 py-10 text-zinc-100 sm:px-6">
	<div class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_20%_15%,rgba(197,161,91,0.18),transparent_36%),radial-gradient(circle_at_78%_0%,rgba(122,16,16,0.30),transparent_32%),linear-gradient(to_bottom,#0b0a0d,#09080c)]"></div>
	<div class="pointer-events-none absolute inset-0 opacity-20 [background:linear-gradient(rgba(255,255,255,0.04)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.04)_1px,transparent_1px)] [background-size:22px_22px]"></div>

	<main class="relative mx-auto max-w-6xl">
		<header class="mb-8 rounded-2xl border border-dragon-gold/20 bg-dragon-ash/70 p-6 shadow-[0_0_50px_rgba(0,0,0,0.55)] backdrop-blur-sm">
			<div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
				<div>
					<p class="font-scroll text-sm uppercase tracking-[0.35em] text-dragon-gold/80">Dragons Compendium</p>
					<h1 class="mt-2 font-crown text-4xl font-bold uppercase tracking-[0.18em] text-dragon-gold sm:text-5xl">Casa do Dragão</h1>
				</div>
				<a href="form.html" class="inline-flex items-center justify-center rounded-lg border border-dragon-gold/50 bg-dragon-ember/30 px-4 py-2 font-crown text-sm uppercase tracking-[0.16em] text-dragon-gold transition hover:bg-dragon-ember/60">Cadastrar Dragão</a>
			</div>
			<p id="status" class="mt-4 min-h-6 font-scroll text-lg text-zinc-300">Carregando dragões...</p>
		</header>

		<section id="dragons-list" class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3" aria-live="polite"></section>
	</main>

</body>
</html>
